<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroGoal - Catálogo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">RetroGoal</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link active" href="/catalog">Catálogo</a></li>
                <li class="nav-item"><a class="nav-link" href="/cart">Carrito</a></li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/login">Entrar</a></li>
                <li class="nav-item"><a class="nav-link" href="/register">Registrarse</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1>Catálogo</h1>
    <form class="row g-3 mb-3" method="get" action="/catalog">
        <div class="col-md-3">
            <input type="text" name="search" class="form-control" placeholder="Buscar por nombre">
        </div>
        <div class="col-md-2">
            <input type="text" name="team" class="form-control" placeholder="Equipo">
        </div>
        <div class="col-md-2">
            <input type="text" name="era" class="form-control" placeholder="Temporada/Era">
        </div>
        <div class="col-md-2">
            <select name="size" class="form-select">
                <option value="">Talla</option>
                <option>S</option>
                <option>M</option>
                <option>L</option>
                <option>XL</option>
            </select>
        </div>
        <div class="col-md-2">
            <input type="number" step="0.01" name="maxPrice" class="form-control" placeholder="Precio máx">
        </div>
        <div class="col-md-1">
            <button type="submit" class="btn btn-primary">Filtrar</button>
        </div>
    </form>
    <div class="row">
        <div class="col-12 col-md-4 mb-4" th:each="product : ${products}">
            <div class="card h-100">
                <img th:src="${product.imageUrl}" class="card-img-top" alt="Imagen de la camiseta">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}">Nombre del Producto</h5>
                    <p class="card-text" th:text="${product.team} + ' (' + ${product.era} + ')'">Equipo/Era</p>
                    <p class="card-text">Talla: <span th:text="${product.size}">M</span></p>
                    <p class="card-text fw-bold">Precio: <span th:text="${product.price}">0.00</span> €</p>
                    <form th:action="@{/cart/add}" method="post">
                        <input type="hidden" name="productId" th:value="${product.id}"/>
                        <button type="submit" class="btn btn-success">Añadir al carrito</button>
                        <a th:href="@{'/product/' + ${product.id}}" class="btn btn-primary ms-2">Ver</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <p th:if="${#lists.isEmpty(products)}">No se han encontrado productos con los criterios seleccionados.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
