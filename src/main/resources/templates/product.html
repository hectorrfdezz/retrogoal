<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroGoal - Producto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">RetroGoal</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/catalog">Catálogo</a></li>
                <li class="nav-item"><a class="nav-link" href="/cart">Carrito</a></li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/login">Entrar</a></li>
                <li class="nav-item"><a class="nav-link" href="/register">Registrarse</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4" th:object="${product}">
    <div class="row">
        <div class="col-md-6">
            <img th:src="*{imageUrl}" class="img-fluid" alt="Imagen del producto">
        </div>
        <div class="col-md-6">
            <h2 th:text="*{name}">Nombre</h2>
            <p th:text="*{description}">Descripción del producto</p>
            <p><strong>Equipo:</strong> <span th:text="*{team}">Equipo</span></p>
            <p><strong>Temporada/Era:</strong> <span th:text="*{era}">Era</span></p>
            <p><strong>Talla:</strong> <span th:text="*{size}">M</span></p>
            <p><strong>Precio:</strong> <span th:text="*{price}">0.00</span> €</p>
            <form th:action="@{/cart/add}" method="post" class="mb-3">
                <input type="hidden" name="productId" th:value="*{id}"/>
                <div class="input-group mb-3" style="max-width: 200px;">
                    <span class="input-group-text">Cantidad</span>
                    <input type="number" name="quantity" class="form-control" min="1" value="1">
                </div>
                <button type="submit" class="btn btn-success">Añadir al carrito</button>
            </form>
            <a href="/catalog" class="btn btn-secondary">Volver al catálogo</a>
        </div>
    </div>
    <hr>
    <h4>También te puede interesar</h4>
    <div class="row">
        <div class="col-6 col-md-3 mb-3" th:each="rec : ${product.recommendedProducts}">
            <div class="card h-100">
                <img th:src="${rec.imageUrl}" class="card-img-top" alt="Recomendación">
                <div class="card-body">
                    <h6 class="card-title" th:text="${rec.name}">Recomendación</h6>
                    <a th:href="@{'/product/' + ${rec.id}}" class="btn btn-sm btn-primary">Ver</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
