<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroGoal - Registro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Custom styles -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <!-- Brand name with translation -->
        <a class="navbar-brand d-flex align-items-center" th:href="@{/(lang=${#locale.language})}">
            <img src="/images/retrogoal-icon.png" alt="RetroGoal logo" class="logo-icon">
            <span class="visually-hidden" th:text="#{navbar.retogoal}">RetroGoal</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:href="@{/catalog(lang=${#locale.language})}" href="/catalog" th:text="#{navbar.catalogo}">Catálogo</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/cart(lang=${#locale.language})}" th:text="#{navbar.carrito} + ' (' + ${cartItemCount} + ')'">Carrito</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/map(lang=${#locale.language})}" href="/map" th:text="#{navbar.mapa}">Mapa</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/checkout(lang=${#locale.language})}" href="/checkout" th:text="#{navbar.pago}">Pago</a></li>
            </ul>
            <ul class="navbar-nav mb-2 mb-lg-0">
                <li class="nav-item dropdown" th:if="${currentUserEmail != null}">
                    <a class="nav-link dropdown-toggle" href="#" id="userMenuRegister" role="button" data-bs-toggle="dropdown" aria-expanded="false" th:text="${currentUserEmail}">Cuenta</a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenuRegister">
                        <li><a class="dropdown-item" th:href="@{/cart(lang=${#locale.language})}" href="/cart" th:text="#{navbar.ver_carrito}">Ver carrito</a></li>
                        <li><a class="dropdown-item" th:href="@{/account/settings(lang=${#locale.language})}">Configuración</a></li>
                        <li th:if="${currentUserIsAdmin}"><a class="dropdown-item" th:href="@{/admin}">Dashboard admin</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" th:href="@{/logout}" href="/logout" th:text="#{navbar.cerrar_sesion}">Cerrar sesión</a></li>
                    </ul>
                </li>
                <li class="nav-item" th:if="${currentUserEmail == null}"><a class="nav-link" th:href="@{/login(lang=${#locale.language})}" href="/login" th:text="#{navbar.entrar}">Entrar</a></li>
                <li class="nav-item" th:if="${currentUserEmail == null}"><a class="nav-link" th:href="@{/register(lang=${#locale.language})}" href="/register" th:text="#{navbar.registrarse}">Registrarse</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="languageMenuRegister" role="button" data-bs-toggle="dropdown" aria-expanded="false" th:text="#{navbar.idioma}">Idioma</a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="languageMenuRegister">
                        <li><a class="dropdown-item" href="?lang=es" th:text="#{navbar.castellano}">Castellano</a></li>
                        <li><a class="dropdown-item" href="?lang=en" th:text="#{navbar.ingles}">English</a></li>
                        <li><a class="dropdown-item" href="?lang=fr" th:text="#{navbar.frances}">Français</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-5" style="max-width: 500px;">
    <h2 class="text-center">Registro</h2>
    <form th:action="@{/register}" method="post" th:object="${user}">
        <div class="mb-3">
            <label for="name" class="form-label">Nombre completo</label>
            <input type="text" id="name" th:field="*{name}" class="form-control" required>
            <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Correo electrónico</label>
            <input type="email" id="email" th:field="*{email}" class="form-control" required>
            <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" id="password" th:field="*{password}" class="form-control" required>
            <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>
        <div class="mb-3">
            <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
            <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control" required>
            <div class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
        </div>
        <div class="alert alert-danger" th:if="${registrationError}" th:text="${registrationError}"></div>
        <button type="submit" class="btn btn-primary w-100">Registrarse</button>
    </form>
    <p class="mt-3 text-center">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>
