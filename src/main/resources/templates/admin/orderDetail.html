<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroGoal - Detalle del pedido</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/admin}">
            <img src="/images/retrogoal-icon.png" alt="RetroGoal logo" class="logo-icon">
            <span class="visually-hidden">RetroGoal</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarOrderDetail" aria-controls="navbarOrderDetail" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarOrderDetail">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:href="@{/admin}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/orders}">Pedidos</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/users}">Usuarios</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/products}">Camisetas</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
        <h1 class="mb-0">Detalle del pedido</h1>
        <a th:href="@{/admin/orders}" class="btn btn-secondary">Volver a pedidos</a>
    </div>

    <div class="card bg-dark text-light border-secondary mb-4">
        <div class="card-body">
            <p><strong>ID:</strong> <span th:text="${order.id}">0</span></p>
            <p><strong>Cliente:</strong> <span th:text="${order.user != null ? order.user.email : 'Usuario eliminado'}">cliente@example.com</span></p>
            <p><strong>Fecha:</strong> <span th:text="${order.orderDate != null ? #temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm') : '--'}">--</span></p>
            <p><strong>Dirección de envío:</strong> <span th:text="${order.shippingAddress ?: '--'}">--</span></p>
            <p><strong>Total:</strong> <span th:text="${order.totalPrice != null ? order.totalPrice : '0.00'}">0.00</span> €</p>
        </div>
    </div>

    <h4>Artículos</h4>
    <div class="table-responsive mb-4">
        <table class="table table-dark table-striped align-middle">
            <thead><tr><th>Producto</th><th>Cantidad</th><th>Precio</th></tr></thead>
            <tbody>
            <tr th:each="item : ${order.orderItems}">
                <td th:text="${item.product != null ? item.product.name : 'Producto eliminado'}">Producto</td>
                <td th:text="${item.quantity}">1</td>
                <td><span th:text="${item.price != null ? item.price : '0.00'}">0.00</span> €</td>
            </tr>
            <tr th:if="${order.orderItems == null or #lists.isEmpty(order.orderItems)}"><td colspan="3" class="text-center text-muted">No hay artículos en este pedido.</td></tr>
            </tbody>
        </table>
    </div>

    <form method="post" th:action="@{'/admin/orders/' + ${order.id}}" class="card bg-dark text-light border-secondary p-4">
        <div class="mb-3">
            <label for="status" class="form-label">Estado</label>
            <select id="status" name="status" class="form-select">
                <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}" th:selected="${order.status == status}"></option>
            </select>
        </div>
        <div class="d-flex gap-2 flex-wrap">
            <button type="submit" class="btn btn-primary">Actualizar</button>
            <a th:href="@{/admin/orders}" class="btn btn-outline-light">Cancelar</a>
            <a th:href="@{/admin}" class="btn btn-secondary">Dashboard</a>
        </div>
    </form>
</main>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
