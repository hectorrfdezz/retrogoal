<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroGoal - Inicio</title>
    <!-- Bootstrap CSS from CDN for quick styling -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">RetroGoal</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/catalog">Catálogo</a></li>
                <li class="nav-item"><a class="nav-link" href="/cart">Carrito</a></li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/login">Entrar</a></li>
                <li class="nav-item"><a class="nav-link" href="/register">Registrarse</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="mb-3">Bienvenido a RetroGoal</h1>
    <p>Descubre nuestra colección de camisetas de fútbol retro y modernas.</p>
    <div class="row">
        <div class="col-12 col-md-4 mb-4" th:each="product : ${products}">
            <div class="card h-100">
                <img th:src="${product.imageUrl}" class="card-img-top" alt="Imagen de la camiseta">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}">Nombre del Producto</h5>
                    <p class="card-text" th:text="${product.team} + ' (' + ${product.era} + ')'">Equipo / Temporada</p>
                    <p class="card-text fw-bold">Precio: <span th:text="${product.price}">0.00</span> €</p>
                    <a th:href="@{'/product/' + ${product.id}}" class="btn btn-primary">Ver</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
