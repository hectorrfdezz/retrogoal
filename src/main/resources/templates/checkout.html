<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroGoal - Checkout</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">RetroGoal</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/catalog">Catálogo</a></li>
                <li class="nav-item"><a class="nav-link" href="/cart">Carrito</a></li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/login">Entrar</a></li>
                <li class="nav-item"><a class="nav-link" href="/register">Registrarse</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1>Checkout</h1>
    <div th:if="${#maps.isEmpty(cartItems)}">
        <p>No hay artículos en el carrito.</p>
    </div>
    <div th:if="${!#maps.isEmpty(cartItems)}">
        <h3>Resumen del pedido</h3>
        <table class="table table-bordered">
            <thead>
            <tr><th>Producto</th><th>Cantidad</th><th>Precio unidad</th><th>Total</th></tr>
            </thead>
            <tbody>
            <tr th:each="entry : ${cartItems}">
                <td th:text="${entry.key.name}">Producto</td>
                <td th:text="${entry.value}">1</td>
                <td th:text="${entry.key.price}">0.00</td>
                <td th:text="${entry.key.price.multiply(#numbers.createBigDecimal(entry.value))}">0.00</td>
            </tr>
            </tbody>
        </table>
        <form method="post" th:action="@{/checkout}">
            <div class="mb-3">
                <label for="address" class="form-label">Dirección de envío</label>
                <textarea id="address" name="shippingAddress" class="form-control" required></textarea>
            </div>
            <!-- Payment info would go here (e.g. Stripe Elements) in a real integration -->
            <button type="submit" class="btn btn-success">Realizar pedido</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
