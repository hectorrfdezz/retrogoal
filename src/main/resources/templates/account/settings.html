<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroGoal - Configuración</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/(lang=${#locale.language})}">
            <img src="/images/retrogoal-icon.png" alt="RetroGoal logo" class="logo-icon">
            <span class="visually-hidden" th:text="#{navbar.retogoal}">RetroGoal</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarAccount" aria-controls="navbarAccount" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarAccount">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:href="@{/catalog(lang=${#locale.language})}" th:text="#{navbar.catalogo}">Catálogo</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/cart(lang=${#locale.language})}">Carrito (<span th:text="${cartItemCount}">0</span>)</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/map(lang=${#locale.language})}" th:text="#{navbar.mapa}">Mapa</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/payment(lang=${#locale.language})}" th:text="#{navbar.pago}">Pago</a></li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown" th:if="${currentUserEmail != null}">
                    <a class="nav-link dropdown-toggle" href="#" id="userMenuAccount" role="button" data-bs-toggle="dropdown" aria-expanded="false" th:text="${currentUserEmail}">Cuenta</a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenuAccount">
                        <li><a class="dropdown-item" th:href="@{/account/settings(lang=${#locale.language})}">Configuración</a></li>
                        <li th:if="${currentUserIsAdmin}"><a class="dropdown-item" th:href="@{/admin}">Dashboard admin</a></li>
                        <li><a class="dropdown-item" th:href="@{/cart(lang=${#locale.language})}" th:text="#{navbar.ver_carrito}">Ver carrito</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" th:href="@{/logout}" th:text="#{navbar.cerrar_sesion}">Cerrar sesión</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <h1 class="mb-4">Configuración de la cuenta</h1>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card bg-dark text-light border-secondary">
                <div class="card-body">
                    <h2 class="h4 mb-3">Datos personales</h2>
                    <div class="alert alert-success" th:if="${profileSuccess}" th:text="${profileSuccess}"></div>
                    <form th:action="@{/account/settings/profile}" method="post">
                        <div class="mb-3">
                            <label class="form-label" for="name">Nombre visible</label>
                            <input class="form-control" id="name" name="name" th:value="${user.name}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="firstName">Nombre</label>
                            <input class="form-control" id="firstName" name="firstName" th:value="${user.firstName}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="lastName">Apellidos (opcional)</label>
                            <input class="form-control" id="lastName" name="lastName" th:value="${user.lastName}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="email">Correo electrónico</label>
                            <input class="form-control" id="email" th:value="${user.email}" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="phone">Teléfono (opcional)</label>
                            <input class="form-control" id="phone" name="phone" th:value="${user.phone}">
                        </div>
                        <button class="btn btn-primary" type="submit">Guardar datos</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card bg-dark text-light border-secondary">
                <div class="card-body">
                    <h2 class="h4 mb-3">Cambiar contraseña</h2>
                    <div class="alert alert-success" th:if="${passwordSuccess}" th:text="${passwordSuccess}"></div>
                    <div class="alert alert-danger" th:if="${passwordError}" th:text="${passwordError}"></div>
                    <form th:action="@{/account/settings/password}" method="post">
                        <div class="mb-3">
                            <label class="form-label" for="currentPassword">Contraseña actual</label>
                            <input class="form-control" type="password" id="currentPassword" name="currentPassword" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="newPassword">Nueva contraseña</label>
                            <input class="form-control" type="password" id="newPassword" name="newPassword" required minlength="6">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="confirmPassword">Confirmar nueva contraseña</label>
                            <input class="form-control" type="password" id="confirmPassword" name="confirmPassword" required minlength="6">
                        </div>
                        <button class="btn btn-primary" type="submit">Cambiar contraseña</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
