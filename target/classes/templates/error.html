<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{error.title}">RetroGoal - Error</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/(lang=${#locale.language})}">
            <img src="/images/retrogoal-icon.png" alt="RetroGoal logo" class="logo-icon">
            <span class="visually-hidden">RetroGoal</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarError" aria-controls="navbarError" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarError">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:href="@{/catalog(lang=${#locale.language})}" th:text="#{navbar.catalogo}">Catálogo</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/cart(lang=${#locale.language})}" th:text="#{navbar.carrito}">Carrito</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/map(lang=${#locale.language})}" th:text="#{navbar.mapa}">Mapa</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card bg-dark text-light border-secondary shadow-lg">
                <div class="card-body p-5 text-center">
                    <h1 class="display-5 mb-3" th:text="#{error.heading}">Ha ocurrido un error</h1>
                    <p class="lead mb-2" th:text="#{error.subtitle}">No se ha podido completar la acción solicitada.</p>
                    <p class="text-muted mb-4">
                        <span th:text="#{error.status}">Código</span>:
                        <strong th:text="${status != null ? status : '500'}">500</strong>
                    </p>
                    <div class="alert alert-warning text-start" th:if="${message != null and !#strings.isEmpty(message)}">
                        <strong th:text="#{error.details}">Detalle:</strong>
                        <span th:text="${message}">Detalle del error</span>
                    </div>
                    <div class="d-flex justify-content-center gap-2 flex-wrap mt-4">
                        <a th:href="@{/(lang=${#locale.language})}" class="btn btn-primary" th:text="#{error.home}">Volver al inicio</a>
                        <a th:href="@{/catalog(lang=${#locale.language})}" class="btn btn-outline-light" th:text="#{error.catalog}">Ver catálogo</a>
                        <a th:href="@{/admin}" class="btn btn-outline-warning" th:text="#{error.admin}">Volver al dashboard</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
