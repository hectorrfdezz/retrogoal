<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroGoal - Mapa</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-o0LbM1opYMqtZdCmXOdapS57LM5g1wq1zYH/2Q6OLpM="
          crossorigin=""/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <!-- Brand name with translation -->
        <a class="navbar-brand" href="/" th:text="#{navbar.retogoal}">RetroGoal</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/catalog" th:text="#{navbar.catalogo}">Catálogo</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/cart}" th:text="#{navbar.carrito} + ' (' + ${cartItemCount} + ')'">Carrito</a></li>
                <li class="nav-item"><a class="nav-link" href="/map" th:text="#{navbar.mapa}">Mapa</a></li>
                <li class="nav-item"><a class="nav-link" href="/checkout" th:text="#{navbar.pago}">Pago</a></li>
            </ul>
            <ul class="navbar-nav mb-2 mb-lg-0">
                <li class="nav-item dropdown" th:if="${currentUserEmail != null}">
                    <a class="nav-link dropdown-toggle" href="#" id="userMenuMap" role="button" data-bs-toggle="dropdown" aria-expanded="false" th:text="${currentUserEmail}">Cuenta</a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenuMap">
                        <li><a class="dropdown-item" href="/cart" th:text="#{navbar.ver_carrito}">Ver carrito</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/logout" th:text="#{navbar.cerrar_sesion}">Cerrar sesión</a></li>
                    </ul>
                </li>
                <li class="nav-item" th:if="${currentUserEmail == null}"><a class="nav-link" href="/login" th:text="#{navbar.entrar}">Entrar</a></li>
                <li class="nav-item" th:if="${currentUserEmail == null}"><a class="nav-link" href="/register" th:text="#{navbar.registrarse}">Registrarse</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="languageMenuMap" role="button" data-bs-toggle="dropdown" aria-expanded="false" th:text="#{navbar.idioma}">Idioma</a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="languageMenuMap">
                        <li><a class="dropdown-item" href="?lang=es" th:text="#{navbar.castellano}">Castellano</a></li>
                        <li><a class="dropdown-item" href="?lang=en" th:text="#{navbar.ingles}">English</a></li>
                        <li><a class="dropdown-item" href="?lang=fr" th:text="#{navbar.frances}">Français</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="mb-3">Localización</h1>
    <p>Encuentra nuestra tienda física en el mapa.</p>
    <div id="map" style="height: 400px;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-o9N1jG5nR+/fj2ne27D6a4Kg1uHn51M73rxWQUoTrI4="
        crossorigin=""></script>
<script>
    // Initialize the map centered on Sevilla (example coordinates)
    var map = L.map('map').setView([37.3891, -5.9845], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);
    L.marker([37.3891, -5.9845]).addTo(map)
        .bindPopup('RetroGoal Sevilla')
        .openPopup();
</script>
</body>
</html>
