<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroGoal - Confirmación de pedido</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">RetroGoal</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/catalog">Catálogo</a></li>
                <li class="nav-item"><a class="nav-link" href="/cart">Carrito</a></li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/login">Entrar</a></li>
                <li class="nav-item"><a class="nav-link" href="/register">Registrarse</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1>¡Gracias por tu compra!</h1>
    <p>Su pedido ha sido procesado correctamente. Recibirá un correo electrónico con la confirmación y los detalles del envío en breve.</p>
    <p><strong>ID de pedido:</strong> <span th:text="${order.id}">0</span></p>
    <p><strong>Importe total:</strong> <span th:text="${order.totalPrice}">0.00</span> €</p>
    <a href="/catalog" class="btn btn-primary">Seguir comprando</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
