<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroGoal - Panel de administración</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h1>Panel de administración</h1>
    <h2 class="mt-4">Productos</h2>
    <a href="/admin/products/new" class="btn btn-success mb-2">Nuevo producto</a>
    <table class="table table-striped">
        <thead>
        <tr><th>ID</th><th>Nombre</th><th>Equipo</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}">1</td>
            <td th:text="${product.name}">Producto</td>
            <td th:text="${product.team}">Equipo</td>
            <td th:text="${product.price}">0.00</td>
            <td th:text="${product.stock}">0</td>
            <td>
                <a th:href="@{'/admin/products/edit/' + ${product.id}}" class="btn btn-primary btn-sm">Editar</a>
                <form th:action="@{'/admin/products/delete/' + ${product.id}}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <h2 class="mt-4">Pedidos</h2>
    <table class="table table-striped">
        <thead>
        <tr><th>ID</th><th>Usuario</th><th>Fecha</th><th>Estado</th><th>Importe</th><th>Acciones</th></tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}">1</td>
            <td th:text="${order.user.email}">cliente@example.com</td>
            <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">--</td>
            <td th:text="${order.status}">PENDING</td>
            <td th:text="${order.totalPrice}">0.00</td>
            <td>
                <a th:href="@{'/admin/orders/' + ${order.id}}" class="btn btn-secondary btn-sm">Ver</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>
