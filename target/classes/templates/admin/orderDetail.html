<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroGoal - Detalle del pedido</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h1>Detalle del pedido</h1>
    <p><strong>ID:</strong> <span th:text="${order.id}">0</span></p>
    <p><strong>Cliente:</strong> <span th:text="${order.user.email}">cliente@example.com</span></p>
    <p><strong>Fecha:</strong> <span th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">--</span></p>
    <p><strong>Dirección de envío:</strong> <span th:text="${order.shippingAddress}">--</span></p>
    <h4>Artículos</h4>
    <table class="table table-bordered">
        <thead><tr><th>Producto</th><th>Cantidad</th><th>Precio</th></tr></thead>
        <tbody>
        <tr th:each="item : ${order.orderItems}">
            <td th:text="${item.product.name}">Producto</td>
            <td th:text="${item.quantity}">1</td>
            <td th:text="${item.price}">0.00</td>
        </tr>
        </tbody>
    </table>
    <p><strong>Total:</strong> <span th:text="${order.totalPrice}">0.00</span> €</p>
    <form method="post" th:action="@{'/admin/orders/' + ${order.id}}">
        <div class="mb-3">
            <label for="status" class="form-label">Estado</label>
            <select id="status" name="status" class="form-select">
                <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}" th:selected="${order.status == status}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Actualizar</button>
        <a href="/admin" class="btn btn-secondary">Volver</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
