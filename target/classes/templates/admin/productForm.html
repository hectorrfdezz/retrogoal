<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroGoal - Producto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h1 th:text="${#fields.hasErrors('*') ? 'Editar Producto' : (product.id == null ? 'Nuevo Producto' : 'Editar Producto')}">Producto</h1>
    <form th:action="@{/admin/products}" method="post" th:object="${product}">
        <input type="hidden" th:field="*{id}"/>
        <div class="mb-3">
            <label for="name" class="form-label">Nombre</label>
            <input type="text" id="name" th:field="*{name}" class="form-control" required>
            <div class="text-danger" th:errors="*{name}" th:if="${#fields.hasErrors('name')}"></div>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Descripción</label>
            <textarea id="description" th:field="*{description}" class="form-control"></textarea>
        </div>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label for="team" class="form-label">Equipo</label>
                <input type="text" id="team" th:field="*{team}" class="form-control">
            </div>
            <div class="col-md-4 mb-3">
                <label for="era" class="form-label">Temporada/Era</label>
                <input type="text" id="era" th:field="*{era}" class="form-control">
            </div>
            <div class="col-md-4 mb-3">
                <label for="size" class="form-label">Talla</label>
                <input type="text" id="size" th:field="*{size}" class="form-control">
            </div>
        </div>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label for="price" class="form-label">Precio (€)</label>
                <input type="number" step="0.01" id="price" th:field="*{price}" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
                <label for="stock" class="form-label">Stock</label>
                <input type="number" id="stock" th:field="*{stock}" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
                <label for="imageUrl" class="form-label">URL de imagen</label>
                <input type="text" id="imageUrl" th:field="*{imageUrl}" class="form-control">
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="/admin" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
