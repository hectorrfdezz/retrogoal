<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.id == null ? 'Nueva Camiseta' : 'Editar Camiseta'}">Camiseta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-black">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/admin}">
            <img th:src="@{/images/retrogoal-icon.png}" alt="RetroGoal" class="logo-icon">
            <span class="visually-hidden">RetroGoal</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarAdminForm" aria-controls="navbarAdminForm" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarAdminForm">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:href="@{/admin}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/catalog(lang=${#locale.language})}">Ver tienda</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h1 class="mb-0" th:text="${product.id == null ? 'Nueva Camiseta' : 'Editar Camiseta'}">Nueva Camiseta</h1>
        <a th:href="@{/admin}" class="btn btn-secondary" role="button">Volver</a>
    </div>

    <form th:object="${product}"
          th:action="@{/admin/products}"
          method="post"
          class="card bg-dark text-light border-secondary p-4">

        <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
            <p class="mb-1">Hay errores en el formulario:</p>
            <ul class="mb-0">
                <li th:each="err : ${#fields.errors('*')}" th:text="${err}">Error</li>
            </ul>
        </div>

        <input type="hidden" th:field="*{id}">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="name" class="form-label">Nombre de la camiseta</label>
                <input type="text" id="name" th:field="*{name}" class="form-control" required
                       placeholder="Ej: Camiseta FC Barcelona 1999">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="col-md-6 mb-3">
                <label for="team" class="form-label">Equipo</label>
                <input type="text" id="team" th:field="*{team}" class="form-control" required
                       placeholder="Ej: FC Barcelona">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('team')}" th:errors="*{team}"></div>
            </div>

            <div class="col-md-4 mb-3">
                <label for="era" class="form-label">Temporada / Era</label>
                <input type="text" id="era" th:field="*{era}" class="form-control"
                       placeholder="Ej: 1998/99">
            </div>

            <div class="col-md-4 mb-3">
                <label for="size" class="form-label">Talla</label>
                <select id="size" th:field="*{size}" class="form-select">
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                    <option value="XL">XL</option>
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <label for="price" class="form-label">Precio</label>
                <input type="number" step="0.01" min="0" id="price" th:field="*{price}" class="form-control" required>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>

            <div class="col-md-4 mb-3">
                <label for="stock" class="form-label">Stock</label>
                <input type="number" min="0" id="stock" th:field="*{stock}" class="form-control" required>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
            </div>

            <div class="col-md-4 mb-3">
                <label for="league" class="form-label">Liga</label>
                <input type="text" id="league" th:field="*{league}" class="form-control"
                       placeholder="LaLiga, Premier League, Bundesliga...">
            </div>

            <div class="col-md-4 mb-3">
                <label for="retro" class="form-label">Tipo</label>
                <select id="retro" th:field="*{retro}" class="form-select">
                    <option th:value="false">Actual</option>
                    <option th:value="true">Retro</option>
                </select>
            </div>

            <div class="col-12 mb-3">
                <label for="imageUrl" class="form-label">Ruta de imagen</label>
                <input type="text" id="imageUrl" th:field="*{imageUrl}" class="form-control"
                       placeholder="/images/barca1999.png">
            </div>

            <div class="col-12 mb-3">
                <label for="description" class="form-label">Descripción</label>
                <textarea id="description" th:field="*{description}" class="form-control" rows="4"
                          placeholder="Ej: Camiseta retro del FC Barcelona de la temporada 1998/99."></textarea>
            </div>
        </div>

        <div class="alert alert-info mt-3">
            Las traducciones en inglés y francés se generan automáticamente al guardar la camiseta.
        </div>

        <div class="d-flex gap-2 mt-3 flex-wrap">
            <button type="submit" class="btn btn-primary">Guardar camiseta</button>
            <a th:href="@{/admin}" class="btn btn-outline-light" role="button">Cancelar</a>
        </div>
    </form>
</main>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
