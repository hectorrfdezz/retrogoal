<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroGoal - Carrito</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">RetroGoal</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/catalog">Catálogo</a></li>
                <li class="nav-item"><a class="nav-link active" href="/cart">Carrito</a></li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/login">Entrar</a></li>
                <li class="nav-item"><a class="nav-link" href="/register">Registrarse</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1>Tu carrito</h1>
    <form th:if="${!#maps.isEmpty(cartItems)}" method="post" th:action="@{/cart/update}">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Total</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="entry : ${cartItems}">
                <td th:text="${entry.key.name}">Nombre</td>
                <td th:text="${entry.key.price}">0.00</td>
                <td>
                    <form th:action="@{/cart/update}" method="post" class="d-flex">
                        <input type="number" name="quantity" th:value="${entry.value}" min="1" class="form-control" style="max-width: 80px;">
                        <input type="hidden" name="productId" th:value="${entry.key.id}"/>
                        <button type="submit" class="btn btn-sm btn-secondary ms-2">Actualizar</button>
                    </form>
                </td>
                <td th:text="${entry.key.price.multiply(#numbers.createBigDecimal(entry.value))}">0.00</td>
                <td>
                    <form th:action="@{/cart/remove}" method="post">
                        <input type="hidden" name="productId" th:value="${entry.key.id}"/>
                        <button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
        <div class="d-flex justify-content-end">
            <a href="/checkout" class="btn btn-primary">Proceder al pago</a>
        </div>
    </form>
    <p th:if="${#maps.isEmpty(cartItems)}">Tu carrito está vacío.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
