# ===============================
# APP CONFIG
# ===============================
spring.application.name=retrogoal
server.port=8080

app.base-url=http://localhost:8080

# ===============================
# MYSQL DATABASE
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/retrogoal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===============================
# IDIOMAS
# ===============================
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# ===============================
# STRIPE
# ===============================
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:pk_test_RELLENA_TU_CLAVE_PUBLICA}
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_RELLENA_TU_CLAVE_SECRETA}

# ===============================
# GOOGLE MAPS
# ===============================
google.maps.api-key=${GOOGLE_MAPS_API_KEY:RELLENA_TU_CLAVE_GOOGLE_MAPS}

# ===============================
# EMAIL
# ===============================
app.mail.enabled=${APP_MAIL_ENABLED:false}
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${APP_MAIL_FROM:no-reply@retrogoal.com}
# ===============================
# CUSTOM ERROR VIEW
# ===============================
server.error.whitelabel.enabled=false
server.error.include-message=always
server.error.include-exception=false
server.error.include-stacktrace=never
