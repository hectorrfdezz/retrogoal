# ==============================================================
# Spring Boot application properties
#
# For demonstration purposes the application uses an in‑memory H2 database.
# To run with MySQL in production change the spring.datasource properties accordingly.
# ==============================================================

spring.datasource.url=jdbc:h2:mem:retrogoal;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Enable H2 web console for testing (access via /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf template settings
spring.thymeleaf.cache=false

# Logging level
logging.level.org.springframework.security=INFO

# Stripe Checkout settings
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
stripe.currency=eur
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Internationalisation: specify the basename for message properties.
spring.messages.basename=messages

