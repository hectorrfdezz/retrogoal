# ==============================================================
# Spring Boot application properties
#
# For demonstration purposes the application uses an in‑memory H2 database.
# To run with MySQL in production change the spring.datasource properties accordingly.
# ==============================================================

spring.datasource.url=jdbc:h2:mem:retrogoal;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Enable H2 web console for testing (access via /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf template settings
spring.thymeleaf.cache=false

# Logging level
logging.level.org.springframework.security=INFO

# Stripe API keys (set these via environment variables in a real deployment)
stripe.api.key=${STRIPE_SECRET_KEY:}
stripe.api.publishable-key=${STRIPE_PUBLISHABLE_KEY:}

# Spring Mail placeholder (configure if using email notifications)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

